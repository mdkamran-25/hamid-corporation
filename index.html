  <link rel="stylesheet" href="styles.css" />
  <script>
    // Apply accent colour and dark/light theme before first paint to prevent flash.
    (function () {
      try {
        var t = localStorage.getItem('hc-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
      // Values must stay in sync with TWEAK_DEFAULTS in app.jsx.
      // Orange accent: hex #f0852e → h 55, c 0.13 | roundness Rounded → scale 1
      var r = document.documentElement.style;
      r.setProperty('--accent-h', 55);
      r.setProperty('--accent-c', 0.13);
      r.setProperty('--radius-scale', 1);
    })();
  </script>
